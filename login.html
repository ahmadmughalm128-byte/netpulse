<body data-theme="dark">

<div class="form-page">

    <div class="form-group">

    </div>
    <div class="form-group" style="position:relative">
      <label class="form-label" for="loginPass">Password</label>

    <p class="form-footer">Don't have an account? <a href="register.html">Create one free →</a></p>

    <!-- Demo hint -->
    <div style="margin-top:20px;padding:12px 16px;background:var(--accent-dim);border:1px solid rgba(0,212,255,.2);border-radius:var(--radius);font-size:.78rem;color:var(--text-muted);font-family:'Space Mono',monospace">
      💡 Practice Login: No real data is stored. Frontend demo only.
    </div>
  </div>
</div>

<script src="/js/main.js"></script>
<script>
function togglePw(id,btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'Show':'Hide';
}
function oauthLogin(provider){
  showToast(`${provider} OAuth — connect your backend!`,'info');
}
function doLogin(){
  showToast("Starting training simulation...","info");

  setTimeout(()=>{
    window.location.href="/pages/dashboard.html";
  },800);
}

    err.textContent='Invalid email';

    return;
  }

 if(pass.length < 4){
  err.textContent='Simulation code too short';
  err.style.display='block';

 <div style="text-align:center;font-size:.75rem;color:gray;margin-bottom:10px">
